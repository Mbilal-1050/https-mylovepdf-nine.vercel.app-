<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to PDFMaster. Access your account to manage PDF files and premium features.">
  <meta name="robots" content="noindex, follow">
  <title>Log In | PDFMaster</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="background:#F8F9FA">
<header class="header" id="header"><div class="container"><div class="header-inner">
  <a href="../index.html" class="logo"><div class="logo-icon"><svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#E8293B"/><path d="M10 8h14l8 8v16a2 2 0 01-2 2H10a2 2 0 01-2-2V10a2 2 0 012-2z" fill="white" opacity="0.9"/><text x="10" y="30" font-size="10" fill="#E8293B" font-weight="800" font-family="Arial">PDF</text></svg></div><span class="logo-text">PDF<span>Master</span></span></a>
  <div style="flex:1"></div>
  <div class="header-actions"><span style="font-size:0.85rem;color:#6C757D">Don't have an account?</span><a href="signup.html" class="btn-primary">Sign Up Free</a></div>
</div></div></header>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><a href="../index.html" class="logo" style="justify-content:center"><div class="logo-icon"><svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#E8293B"/><path d="M10 8h14l8 8v16a2 2 0 01-2 2H10a2 2 0 01-2-2V10a2 2 0 012-2z" fill="white" opacity="0.9"/><text x="10" y="30" font-size="10" fill="#E8293B" font-weight="800" font-family="Arial">PDF</text></svg></div><span class="logo-text">PDF<span>Master</span></span></a></div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to your PDFMaster account</p>
    <!-- Google Sign In -->
    <button onclick="showGoogleMsg()" style="width:100%;padding:11px;border:1.5px solid #DEE2E6;border-radius:10px;background:white;font-size:0.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;transition:border-color 0.2s" onmouseover="this.style.borderColor='#E8293B'" onmouseout="this.style.borderColor='#DEE2E6'">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div id="google-msg" style="display:none;background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:10px;padding:12px;text-align:center;font-size:0.85rem;color:#E8293B;margin-top:10px">
      ⚙️ Google Sign In abhi setup ho raha hai. Email se login karein!
    </div>
    <script>function showGoogleMsg(){document.getElementById('google-msg').style.display='block';}</script>
    <div class="auth-divider"><span>or log in with email</span></div>
    <form id="login-form">
      <div class="form-group">
        <label style="font-size:0.85rem;font-weight:600;color:#495057;display:block;margin-bottom:6px">Email Address</label>
        <input type="email" placeholder="you@example.com" required style="width:100%;padding:11px 14px;border:1.5px solid #DEE2E6;border-radius:10px;font-size:0.9rem;font-family:inherit;outline:none">
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label style="font-size:0.85rem;font-weight:600;color:#495057">Password</label>
          <a href="#" style="font-size:0.8rem;color:#E8293B;font-weight:600">Forgot password?</a>
        </div>
        <input type="password" placeholder="••••••••" required style="width:100%;padding:11px 14px;border:1.5px solid #DEE2E6;border-radius:10px;font-size:0.9rem;font-family:inherit;outline:none">
      </div>
      <button type="submit" class="btn-full" style="margin-top:8px">Log In →</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up free</a></p>
  </div>
</div>
<script src="../js/main.js"></script>
</body></html>
